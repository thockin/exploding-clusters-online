<svg width="100" height="600" viewBox="0 0 100 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Long Arm -->
  <rect x="35" y="0" width="30" height="550" fill="#ffccaa" />
  <path d="M35,0 L35,550 M65,550 L65,0" stroke="#dcb294" stroke-width="2" />

  <!-- Closed Hand (Fist) -->
  <g transform="translate(0, 500)">
      <circle cx="50" cy="50" r="30" fill="#ffccaa" />
      <!-- Curled fingers -->
      <ellipse cx="30" cy="60" rx="10" ry="15" fill="#eebb99" />
      <ellipse cx="43" cy="65" rx="10" ry="15" fill="#eebb99" />
      <ellipse cx="57" cy="65" rx="10" ry="15" fill="#eebb99" />
      <ellipse cx="70" cy="60" rx="10" ry="15" fill="#eebb99" />
      
      <!-- Thumb across -->
      <ellipse cx="50" cy="75" rx="20" ry="8" fill="#ffccaa" />
  </g>
</svg>