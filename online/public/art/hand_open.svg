<svg width="100" height="600" viewBox="0 0 100 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Long Arm -->
  <rect x="35" y="0" width="30" height="550" fill="#ffccaa" />
  <path d="M35,0 L35,550 M65,550 L65,0" stroke="#dcb294" stroke-width="2" />
  
  <!-- Open Hand at bottom -->
  <g transform="translate(0, 500)">
      <circle cx="50" cy="50" r="35" fill="#ffccaa" />
      <!-- Splayed fingers -->
      <ellipse cx="20" cy="40" rx="8" ry="25" transform="rotate(-30 20 40)" fill="#ffccaa" />
      <ellipse cx="35" cy="80" rx="8" ry="25" transform="rotate(-10 35 80)" fill="#ffccaa" />
      <ellipse cx="65" cy="80" rx="8" ry="25" transform="rotate(10 65 80)" fill="#ffccaa" />
      <ellipse cx="80" cy="40" rx="8" ry="25" transform="rotate(30 80 40)" fill="#ffccaa" />
      
      <!-- Outline details -->
      <path d="M35,50 Q20,50 20,85 Q20,100 30,100 L70,100 Q80,100 80,85 Q80,50 65,50" stroke="#dcb294" stroke-width="2" fill="none"/>
  </g>
</svg>